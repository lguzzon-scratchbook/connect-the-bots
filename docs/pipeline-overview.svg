<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 700" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#38bdf8"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#16a34a"/>
    </marker>
    <marker id="arrow-amber" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f59e0b"/>
    </marker>
    <marker id="arrow-red" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#dc2626"/>
    </marker>
    <marker id="arrow-purple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#a78bfa"/>
    </marker>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.1"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="700" rx="12" fill="#0f172a"/>

  <!-- Title -->
  <text x="450" y="38" text-anchor="middle" fill="#f1f5f9" font-size="20" font-weight="700">How PAS Works</text>
  <text x="450" y="58" text-anchor="middle" fill="#94a3b8" font-size="13">Two paths to a running pipeline — choose the one that fits</text>

  <!-- ═══════════════════════════════════════════════ -->
  <!-- PATH A: Direct Generation                       -->
  <!-- ═══════════════════════════════════════════════ -->

  <rect x="30" y="76" width="840" height="108" rx="10" fill="#1e293b" stroke="#16a34a" stroke-width="1.5" stroke-dasharray="6,3" filter="url(#shadow)"/>
  <text x="450" y="96" text-anchor="middle" fill="#4ade80" font-size="14" font-weight="600">PATH A — Direct Generation</text>

  <!-- Write Spec +/- PRD -->
  <rect x="55" y="108" width="200" height="62" rx="8" fill="#14532d" stroke="#16a34a" stroke-width="1"/>
  <text x="155" y="131" text-anchor="middle" fill="#dcfce7" font-size="13" font-weight="500">Write Documents</text>
  <text x="155" y="149" text-anchor="middle" fill="#86efac" font-size="10">Spec, or PRD + Spec</text>
  <text x="155" y="164" text-anchor="middle" fill="#4ade80" font-size="9" font-style="italic">you write these</text>

  <!-- Arrow 1 to 2 -->
  <line x1="259" y1="139" x2="293" y2="139" stroke="#16a34a" stroke-width="2" marker-end="url(#arrow-green)"/>

  <!-- pas generate -->
  <rect x="299" y="108" width="200" height="62" rx="8" fill="#14532d" stroke="#16a34a" stroke-width="1"/>
  <text x="399" y="131" text-anchor="middle" fill="#dcfce7" font-size="13" font-weight="500">Generate Pipeline</text>
  <text x="399" y="149" text-anchor="middle" fill="#4ade80" font-size="10" font-family="'SF Mono', 'Fira Code', monospace">pas generate spec.md</text>
  <text x="399" y="164" text-anchor="middle" fill="#86efac" font-size="9">or: pas launch</text>

  <!-- Arrow 2 to 3 -->
  <line x1="503" y1="139" x2="537" y2="139" stroke="#16a34a" stroke-width="2" marker-end="url(#arrow-green)"/>

  <!-- pipeline.dot output badge -->
  <rect x="543" y="115" width="200" height="48" rx="6" fill="#052e16" stroke="#22c55e" stroke-width="1.5"/>
  <text x="643" y="138" text-anchor="middle" fill="#4ade80" font-size="13" font-weight="600" font-family="'SF Mono', 'Fira Code', monospace">pipeline.dot</text>
  <text x="643" y="155" text-anchor="middle" fill="#86efac" font-size="10">self-contained — no beads needed</text>

  <!-- ═══════════════════════════════════════════════ -->
  <!-- OR divider                                      -->
  <!-- ═══════════════════════════════════════════════ -->

  <line x1="100" y1="196" x2="400" y2="196" stroke="#334155" stroke-width="1"/>
  <text x="450" y="201" text-anchor="middle" fill="#64748b" font-size="13" font-weight="600">OR</text>
  <line x1="500" y1="196" x2="800" y2="196" stroke="#334155" stroke-width="1"/>

  <!-- ═══════════════════════════════════════════════ -->
  <!-- PATH B: Planning Workflow with Beads            -->
  <!-- ═══════════════════════════════════════════════ -->

  <rect x="30" y="210" width="840" height="170" rx="10" fill="#1e293b" stroke="#38bdf8" stroke-width="1.5" stroke-dasharray="6,3" filter="url(#shadow)"/>
  <text x="450" y="232" text-anchor="middle" fill="#38bdf8" font-size="14" font-weight="600">PATH B — Planning Workflow with Beads</text>

  <!-- Step 1: Craft PRD -->
  <rect x="100" y="246" width="155" height="64" rx="8" fill="#0c4a6e" stroke="#0ea5e9" stroke-width="1"/>
  <text x="177" y="268" text-anchor="middle" fill="#e0f2fe" font-size="12" font-weight="500">Craft PRD</text>
  <text x="177" y="286" text-anchor="middle" fill="#7dd3fc" font-size="10" font-family="'SF Mono', 'Fira Code', monospace">pas plan --prd</text>
  <text x="177" y="302" text-anchor="middle" fill="#94a3b8" font-size="9">You + Claude</text>

  <!-- Arrow PRD to Spec -->
  <line x1="259" y1="278" x2="279" y2="278" stroke="#38bdf8" stroke-width="2" marker-end="url(#arrow-blue)"/>

  <!-- Step 2: Craft Spec -->
  <rect x="283" y="246" width="155" height="64" rx="8" fill="#0c4a6e" stroke="#0ea5e9" stroke-width="1"/>
  <text x="360" y="268" text-anchor="middle" fill="#e0f2fe" font-size="12" font-weight="500">Craft Spec</text>
  <text x="360" y="286" text-anchor="middle" fill="#7dd3fc" font-size="10" font-family="'SF Mono', 'Fira Code', monospace">pas plan --spec</text>
  <text x="360" y="302" text-anchor="middle" fill="#94a3b8" font-size="9">You + Claude</text>

  <!-- Arrow Spec to Decompose -->
  <line x1="442" y1="278" x2="462" y2="278" stroke="#38bdf8" stroke-width="2" marker-end="url(#arrow-blue)"/>

  <!-- Step 3: Decompose -->
  <rect x="466" y="246" width="155" height="64" rx="8" fill="#451a03" stroke="#f59e0b" stroke-width="1"/>
  <text x="543" y="268" text-anchor="middle" fill="#fef3c7" font-size="12" font-weight="500">Decompose</text>
  <text x="543" y="286" text-anchor="middle" fill="#fcd34d" font-size="10" font-family="'SF Mono', 'Fira Code', monospace">pas decompose</text>
  <text x="543" y="302" text-anchor="middle" fill="#94a3b8" font-size="9">Spec to beads tasks</text>

  <!-- Arrow Decompose to Scaffold -->
  <line x1="625" y1="278" x2="645" y2="278" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrow-amber)"/>

  <!-- Step 4: Scaffold Pipeline -->
  <rect x="649" y="246" width="155" height="64" rx="8" fill="#0c4a6e" stroke="#0ea5e9" stroke-width="1"/>
  <text x="726" y="268" text-anchor="middle" fill="#e0f2fe" font-size="12" font-weight="500">Scaffold Pipeline</text>
  <text x="726" y="286" text-anchor="middle" fill="#7dd3fc" font-size="10" font-family="'SF Mono', 'Fira Code', monospace">pas scaffold</text>
  <text x="726" y="302" text-anchor="middle" fill="#94a3b8" font-size="9">PAS CLI</text>

  <!-- Produces row -->
  <text x="177" y="326" text-anchor="middle" fill="#64748b" font-size="9" font-weight="600">PRODUCES</text>
  <rect x="130" y="332" width="95" height="24" rx="4" fill="#172554" stroke="#3b82f6" stroke-width="1"/>
  <text x="177" y="348" text-anchor="middle" fill="#93c5fd" font-size="10" font-family="'SF Mono', 'Fira Code', monospace">prd.md</text>

  <text x="360" y="326" text-anchor="middle" fill="#64748b" font-size="9" font-weight="600">PRODUCES</text>
  <rect x="313" y="332" width="95" height="24" rx="4" fill="#172554" stroke="#3b82f6" stroke-width="1"/>
  <text x="360" y="348" text-anchor="middle" fill="#93c5fd" font-size="10" font-family="'SF Mono', 'Fira Code', monospace">spec.md</text>

  <text x="543" y="326" text-anchor="middle" fill="#64748b" font-size="9" font-weight="600">PRODUCES</text>
  <rect x="484" y="332" width="118" height="24" rx="4" fill="#422006" stroke="#f59e0b" stroke-width="1"/>
  <text x="543" y="348" text-anchor="middle" fill="#fcd34d" font-size="10" font-family="'SF Mono', 'Fira Code', monospace">beads epic+tasks</text>

  <text x="726" y="326" text-anchor="middle" fill="#64748b" font-size="9" font-weight="600">PRODUCES</text>
  <rect x="679" y="332" width="95" height="24" rx="4" fill="#172554" stroke="#3b82f6" stroke-width="1"/>
  <text x="726" y="348" text-anchor="middle" fill="#93c5fd" font-size="10" font-family="'SF Mono', 'Fira Code', monospace">pipeline.dot</text>

  <!-- ═══════════════════════════════════════════════ -->
  <!-- Convergence: pas run                            -->
  <!-- ═══════════════════════════════════════════════ -->

  <line x1="450" y1="385" x2="450" y2="418" stroke="#a78bfa" stroke-width="2.5" marker-end="url(#arrow-purple)"/>
  <text x="480" y="405" fill="#a78bfa" font-size="12" font-weight="600" font-family="'SF Mono', 'Fira Code', monospace">pas run</text>

  <!-- ═══════════════════════════════════════════════ -->
  <!-- EXECUTION ENGINE                                -->
  <!-- ═══════════════════════════════════════════════ -->

  <rect x="120" y="424" width="660" height="195" rx="10" fill="#1e293b" stroke="#6366f1" stroke-width="1.5" stroke-dasharray="6,3" filter="url(#shadow)"/>
  <text x="450" y="446" text-anchor="middle" fill="#a78bfa" font-size="14" font-weight="600">EXECUTION ENGINE</text>

  <!-- VALIDATE -->
  <rect x="145" y="458" width="120" height="60" rx="6" fill="#312e81" stroke="#6366f1" stroke-width="1"/>
  <text x="205" y="479" text-anchor="middle" fill="#c4b5fd" font-size="10" font-weight="600">VALIDATE</text>
  <text x="205" y="497" text-anchor="middle" fill="#e0e7ff" font-size="11">12 lint rules</text>
  <text x="205" y="511" text-anchor="middle" fill="#a5b4fc" font-size="9">before any LLM call</text>

  <!-- Arrow -->
  <line x1="269" y1="488" x2="294" y2="488" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- EXECUTE NODE -->
  <rect x="300" y="458" width="120" height="60" rx="6" fill="#1a2332" stroke="#334155" stroke-width="1"/>
  <text x="360" y="479" text-anchor="middle" fill="#94a3b8" font-size="10" font-weight="600">EXECUTE NODE</text>
  <text x="360" y="497" text-anchor="middle" fill="#e2e8f0" font-size="11">Claude Code</text>
  <text x="360" y="511" text-anchor="middle" fill="#64748b" font-size="9">full agent loop</text>

  <!-- Arrow -->
  <line x1="424" y1="488" x2="449" y2="488" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- VERIFY -->
  <rect x="455" y="458" width="120" height="60" rx="6" fill="#14532d" stroke="#16a34a" stroke-width="1"/>
  <text x="515" y="479" text-anchor="middle" fill="#86efac" font-size="10" font-weight="600">VERIFY</text>
  <text x="515" y="497" text-anchor="middle" fill="#dcfce7" font-size="11">Goal gates</text>
  <text x="515" y="511" text-anchor="middle" fill="#4ade80" font-size="9">schema + routing</text>

  <!-- Arrow -->
  <line x1="579" y1="488" x2="604" y2="488" stroke="#16a34a" stroke-width="1.5" marker-end="url(#arrow-green)"/>

  <!-- ROUTE -->
  <rect x="610" y="458" width="120" height="60" rx="6" fill="#1a2332" stroke="#334155" stroke-width="1"/>
  <text x="670" y="479" text-anchor="middle" fill="#94a3b8" font-size="10" font-weight="600">ROUTE</text>
  <text x="670" y="497" text-anchor="middle" fill="#e2e8f0" font-size="11">Next node or exit</text>
  <text x="670" y="511" text-anchor="middle" fill="#64748b" font-size="9">edge selection</text>

  <!-- Retry loop: verify back to execute -->
  <path d="M 455 521 L 425 538 L 340 538 L 340 521" stroke="#dc2626" stroke-width="1.5" fill="none" marker-end="url(#arrow-red)" stroke-dasharray="5,3"/>
  <text x="390" y="553" text-anchor="middle" fill="#f87171" font-size="9">retry on fail</text>

  <!-- Next node loop: route back to execute -->
  <path d="M 670 521 L 670 570 L 360 570 L 360 521" stroke="#64748b" stroke-width="1.5" fill="none" marker-end="url(#arrow)" stroke-dasharray="5,3"/>
  <text x="515" y="585" text-anchor="middle" fill="#94a3b8" font-size="9">next node</text>

  <!-- ═══════════════════════════════════════════════ -->
  <!-- OUTPUT                                          -->
  <!-- ═══════════════════════════════════════════════ -->

  <!-- Arrow from engine to output -->
  <line x1="450" y1="622" x2="450" y2="637" stroke="#16a34a" stroke-width="2" marker-end="url(#arrow-green)"/>

  <rect x="30" y="642" width="840" height="46" rx="8" fill="#14532d" stroke="#16a34a" stroke-width="1"/>
  <text x="450" y="662" text-anchor="middle" fill="#4ade80" font-size="14" font-weight="600">OUTPUT</text>
  <text x="450" y="678" text-anchor="middle" fill="#86efac" font-size="12">Verified code  +  Cost breakdown  +  Execution log</text>
</svg>
